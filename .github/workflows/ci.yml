name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache uv/venv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          pip install -U uv
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          . .venv/bin/activate
          ruff check src tests

      - name: Ruff format
        run: |
          . .venv/bin/activate
          ruff format --check src tests

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache uv/venv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          pip install -U uv
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: pytest
        run: |
          . .venv/bin/activate
          pytest -q -m "not slow and not gpu" \
            --junitxml=junit.xml \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            junit.xml
            coverage.xml
            htmlcov/
          retention-days: 7
