stages:
  - lint
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

default:
  image: python:3.13-slim
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
      - .venv/

.install_deps: &install_deps
  before_script:
    - python --version
    - pip install -U uv
    - uv venv .venv
    - . .venv/bin/activate
    - uv pip install -e ".[dev]"

ruff:
  stage: lint
  <<: *install_deps
  script:
    - . .venv/bin/activate
    - ruff check src tests
    - ruff format --check src tests

pytest:
  stage: test
  <<: *install_deps
  script:
    - . .venv/bin/activate
    - pytest -q -m "not slow and not gpu" \
        --junitxml=junit.xml \
        --cov=src \
        --cov-report=term-missing \
        --cov-report=xml:coverage.xml \
        --cov-report=html:htmlcov
  coverage: '/TOTAL\s+\d+\s+\d+\s+\d+\s+(\d+%)/'
  artifacts:
    when: always
    reports:
      junit: junit.xml
    paths:
      - junit.xml
      - coverage.xml
      - htmlcov/
    expire_in: 7 days