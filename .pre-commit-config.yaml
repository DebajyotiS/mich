repos:
  # --------------------------------------------------
  # Basic hygiene
  # --------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  # --------------------------------------------------
  # Ruff: formatting + linting
  # --------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # --------------------------------------------------
  # Pytest (unit + lightweight integration tests)
  # --------------------------------------------------
  - repo: local
    hooks:
      - id: pytest
        name: pytest (fast tests only)
        entry: pytest
        language: system
        pass_filenames: false
        args:
          - -q
          - -m
          - "not slow and not gpu"

- repo: local
  hooks:
    - id: ruff-check
      name: ruff check
      entry: ruff check src tests
      language: system
      pass_filenames: false
      stages: [pre-push]

    - id: ruff-format-check
      name: ruff format --check
      entry: ruff format --check src tests
      language: system
      pass_filenames: false
      stages: [pre-push]

    - id: pytest
      name: pytest (fast tests only)
      entry: pytest
      language: system
      pass_filenames: false
      stages: [pre-push]
      args:
        - -q
        - -m
        - "not slow and not gpu"
