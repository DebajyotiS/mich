_target_: src.data.synthetic.SyntheticDataModule

data:
  path: ${paths.data_dir}
  layers: [layer_0, layer_1, layer_2]
  dtype: float16
  return_meta: true

split:
  train_frac: 0.2
  val_frac: 0.1
  test_frac: 0.7
  train_count: null
  val_count: null
  test_count: null
  seed: 42
  shuffle: true

loader:
  batch_size: 2
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  drop_last: true

h5_cache:
  rdcc_nbytes: 268435456   # 256MB per worker
  rdcc_nslots: 200003     
  rdcc_w0: 0.75
  swmr: false