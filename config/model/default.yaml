_target_: mich.models.mich.MICH

L: 3
C: 32
c_enc: 64
c_dec: 64
c_film: 32      # FiLM bottleneck per signal
signal_embed_dim: 8
num_freqs: 24   # log-spaced between min_freq/max_freq
min_freq: 1.0
max_freq: 48.0  # just under Nyquist ((T-1)/2=49.5)
tcn_kernel: 3
spatial_radius: 2
grid_size: 10

embed_dim: 20   # overridden in SpatioTemporalDecoder.__init__
out_channels: 7 # must equal len(signals); not multiplied by L

heinzle_net:
  _target_: mich.models.blocks.HeinzleNet

  layer_mixing_config:
    L: ${model.L}
    C: ${model.C}
    init_identity: true

  spatial_encoder_config:
    - cin: ${model.C}
      cout: ${model.c_enc}
      stride: 1
      dw_kernel: 3
      pw_kernel: 1
      num_groups: 8
      activation: silu
    - cin: ${model.c_enc}
      cout: ${model.c_enc}
      stride: 1
      dw_kernel: 3
      pw_kernel: 1
      num_groups: 8
      activation: silu
    - cin: ${model.c_enc}
      cout: ${model.c_enc}
      stride: 1
      dw_kernel: 3
      pw_kernel: 1
      num_groups: 8
      activation: silu
    - cin: ${model.c_enc}
      cout: ${model.c_enc}
      stride: 1
      dw_kernel: 3
      pw_kernel: 1
      num_groups: 8
      activation: silu

  temporal_mixing_config:
    - cin: ${model.c_enc}
      kernel_size: ${model.tcn_kernel}
      num_groups: 8
      activation: silu
      dilation: 1
    - cin: ${model.c_enc}
      kernel_size: ${model.tcn_kernel}
      num_groups: 8
      activation: silu
      dilation: 2
    - cin: ${model.c_enc}
      kernel_size: ${model.tcn_kernel}
      num_groups: 8
      activation: silu
      dilation: 4
    - cin: ${model.c_enc}
      kernel_size: ${model.tcn_kernel}
      num_groups: 8
      activation: silu
      dilation: 8
    - cin: ${model.c_enc}
      kernel_size: ${model.tcn_kernel}
      num_groups: 8
      activation: silu
      dilation: 16
    - cin: ${model.c_enc}
      kernel_size: ${model.tcn_kernel}
      num_groups: 8
      activation: silu
      dilation: 16
  auto_dilation: false
  time_embedding_config:
    num_freqs: ${model.num_freqs}
    min_freq: ${model.min_freq}
    max_freq: ${model.max_freq}

  time_film_config:
    embed_dim: ${model.embed_dim}  # overridden in SpatioTemporalDecoder.__init__
    hidden_dim: ${model.c_film}
    activation: silu
    c_dec: ${model.c_film}         # overridden in SpatioTemporalDecoder.__init__

  spatial_decoder_config:
    cin: ${model.c_enc}
    c_dec: ${model.c_dec}
    c_film: ${model.c_film}
    signal_embed_dim: ${model.signal_embed_dim}
    out_channels: ${model.out_channels}
    activation: silu
    L: ${model.L}
    layer_embed_dim: 8

normaliser:
  _target_: mich.models.normaliser.LayerwiseBOLDNormalizer
  H: ${model.grid_size}
  W: ${model.grid_size}
  eps: 1.0e-6
  freeze_after_steps: 320  # ~20 epochs at 16 steps/epoch (batch=128, n_train=2100)
  neighbourhood_radius: ${model.spatial_radius}

loss_config:
  order: linear # choose between linear, quadratic, exact
  lambda_data: 100.0
  lambda_physics: 1000.0
  warmup_steps_physics: 100
  delay_steps_physics: 50
  lambda_src: 10.0
  lambda_smooth: 0.0
  warmup_steps_smooth: 0
  delay_steps_smooth: 0
  lambda_source_activity: 0.5     # 0.0 disables; penalises flat x collapse at source voxel
  source_activity_epsilon: 0.01   # variance threshold (hinge)
  warmup_steps_source_activity: 0
  delay_steps_source_activity: 0
  lambda_quiescence_consistency: 0.0  # 0.0 = off (opt-in); only off-source hallucination guard
  warmup_steps_quiescence_consistency: 500
  delay_steps_quiescence_consistency: 500
  quiescence_consistency_tau_s: 0.05   # |s| below this counts as baseline
  quiescence_consistency_tau_f: 0.05   # |f - 1| below this counts as baseline
  quiescence_consistency_eps_x: 0.05   # |x| above this at a quiescent (s, f) voxel is hallucination
  lambda_supervision: 100.0
  warmup_steps_supervision: 0
  delay_steps_supervision: 0
  supervise_x: false
  supervise_dzdt: true
  lambda_dzdt_supervision: 100.0 # weight applied when supervise_dzdt=true
  warmup_steps_dzdt_supervision: 0
  delay_steps_dzdt_supervision: 0
  dzdt_supervision_signals: ["s", "f", "v", "q"] # subset of dataset signals
  supervise_x_phase: false
  lambda_x_phase: 10.0 # used unless lambda_x_phase_start/_end anneal is active
  warmup_steps_x_phase: 0
  delay_steps_x_phase: 0
  # shared anneal window; no-op unless end_step > start_step
  x_phase_ratio_anneal_start_step: 0
  x_phase_ratio_anneal_end_step: 0
  # MSE-favoring (stable) -> pearson-favoring (sharper alignment, more ringing)
  x_phase_npearson_start: 10.0
  x_phase_npearson_end: 1.0
  x_phase_pearson_start: 1.0
  x_phase_pearson_end: 10.0
  # ramped up so x_phase's gradient share doesn't fade late in training
  lambda_x_phase_start: 10.0
  lambda_x_phase_end: 80.0
  n_space: 100 # colocation points
  dense_spatial_frac: 0.95
  dense_spatial_radius: ${model.spatial_radius}
  n_time: 100
  dense_time_frac: 0.0
  dense_time_lo: 0.0
  dense_time_hi: 0.70
  uniform_time_lo: 0.0
  burn_in: 0
  supervision_loss:
    type: "mse+pearson"
    lambda_npearson: 10.0
    lambda_pearson: 1.0
    huber_delta: 0.1
  bold_loss:
    type: "mse+pearson"
    lambda_npearson: 10.0
    lambda_pearson: 1.0
    huber_delta: 0.1 #used if type is "huber" or "huber+pearson"
  ode_loss:
    type: "mse"
    huber_delta: 0.1 #used if type is "huber"
  dzdt_loss:
    type: "huber" # caps outlier influence of ds/dt at sharp transitions
  x_phase_loss:
    type: "mse+pearson" # pearson is what makes this loss shape/phase-sensitive.
    lambda_npearson: 10.0
    lambda_pearson: 1.0
    huber_delta: 0.1
image_log_every_n_val_calls: 1

# set true to make a physiological constant learnable (optimized in log-space, init
# from the simulation value). lambda_d/tau_d not yet supported; k1/k2/k3 recompute from E0.
learnable_physio:
  kappa: false
  gamma: false
  alpha: false
  tau: false
  V0: false
  E0: false

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 3.0e-4
  weight_decay: 1.0e-5

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  T_max: null       # auto-computed by train_mich.py (_inject_scheduler_steps); set an int to override
  eta_min: 1.0e-6

lightning:
  interval: step
  frequency: 1
  monitor: val/loss/total
