_target_: src.models.mich.MICH

L: 3
C: 32
c_enc: 64
c_dec: 64
c_film: 32           # FiLM bottleneck per signal (~c_dec / 7, rounded up for groups)
signal_embed_dim: 8
num_freqs: 10
min_freq: 5.0
max_freq: 20.0
tcn_kernel: 3
spatial_radius: 2
grid_size: 10 # this was 32

embed_dim: 20 # overridden in SpatioTemporalDecoder.__init__; kept for reference
out_channels: 21

heinzle_net:
  _target_: src.models.blocks.HeinzleNet

  layer_mixing_config:
    L: ${model.L}
    C: ${model.C}
    init_identity: true

  spatial_encoder_config:
    - cin: ${model.C}
      cout: ${model.c_enc}
      stride: 1
      dw_kernel: 3
      pw_kernel: 1
      num_groups: 8
      activation: silu
    - cin: ${model.c_enc}
      cout: ${model.c_enc}
      stride: 1
      dw_kernel: 3
      pw_kernel: 1
      num_groups: 8
      activation: silu

  temporal_mixing_config:
    - cin: ${model.c_enc}
      kernel_size: ${model.tcn_kernel}
      num_groups: 8
      activation: silu
    - cin: ${model.c_enc}
      kernel_size: ${model.tcn_kernel}
      num_groups: 8
      activation: silu
    - cin: ${model.c_enc}
      kernel_size: ${model.tcn_kernel}
      num_groups: 8
      activation: silu
    - cin: ${model.c_enc}
      kernel_size: ${model.tcn_kernel}
      num_groups: 8
      activation: silu
    - cin: ${model.c_enc}
      kernel_size: ${model.tcn_kernel}
      num_groups: 8
      activation: silu
    - cin: ${model.c_enc}
      kernel_size: ${model.tcn_kernel}
      num_groups: 8
      activation: silu

  time_embedding_config:
    num_freqs: ${model.num_freqs}
    min_freq: ${model.min_freq}
    max_freq: ${model.max_freq}

  time_film_config:
    embed_dim: ${model.embed_dim}  # overridden in SpatioTemporalDecoder.__init__
    hidden_dim: ${model.c_film}
    activation: silu
    c_dec: ${model.c_film}         # overridden to c_film in SpatioTemporalDecoder.__init__

  spatial_decoder_config:
    cin: ${model.c_enc}
    c_dec: ${model.c_dec}
    c_film: ${model.c_film}
    signal_embed_dim: ${model.signal_embed_dim}
    out_channels: ${model.out_channels}
    activation: silu
    L: ${model.L}
    layer_embed_dim: 8

normaliser:
  _target_: src.models.normaliser.LayerwiseBOLDNormalizer
  H: ${model.grid_size}
  W: ${model.grid_size}
  eps: 1.0e-6
  freeze_after_steps: 5000
  neighbourhood_radius: ${model.spatial_radius}

loss_config:
  order: linear # choose between linear, quadratic, exact
  lambda_data: 1.0
  lambda_physics: 1000.0
  warmup_steps_physics: 20
  delay_steps_physics: 10
  lambda_src: 10.0
  lambda_smooth: 0.0
  warmup_steps_smooth: 0
  delay_steps_smooth: 0
  lambda_antisteady: 0.5        # set 0.0 to disable
  antisteady_epsilon: 0.01      # variance threshold (hinge)
  warmup_steps_antisteady: 0    # optional warm-up
  delay_steps_antisteady: 0
  lambda_supervision: 0.0
  warmup_steps_supervision: 0
  delay_steps_supervision: 0
  n_space: 100 # colocation points
  dense_spatial_frac: 0.95
  dense_spatial_radius: ${model.spatial_radius}
  n_time: 100
  dense_time_frac: 0.0
  dense_time_lo: 0.0
  dense_time_hi: 0.70
  uniform_time_lo: 0.0
  burn_in: 0
  supervision_loss:
    type: "mse+pearson"
    lambda_npearson: 10.0
    lambda_pearson: 1.0
    huber_delta: 0.1
  bold_loss:
    type: "mse+pearson"
    lambda_npearson: 10.0
    lambda_pearson: 1.0
    huber_delta: 0.1 #used if type is "huber" or "huber+pearson"
  ode_loss:
    type: "mse"
    huber_delta: 0.1 #used if type is "huber"

# haemo, acquisition, V0, psf_fwhm are injected at runtime from the simulation
# HDF5 by _inject_sim_physics() in train_mich.py — do not set them here.

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 3.0e-4
  weight_decay: 1.0e-5

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  T_max: 125000
  eta_min: 1.0e-6

lightning:
  interval: step
  frequency: 1
  monitor: val/loss/total