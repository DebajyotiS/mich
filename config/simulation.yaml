# ──────────────────────────────────────────────
# BOLD simulation config
# ──────────────────────────────────────────────

num_simulations: 10
seed: 42
output_path: data/simulations.h5

# ── Haemodynamic constants ──────────────────────
haemodynamic:
  alpha: 0.32       # Grubb's exponent
  E0: 0.34          # Resting oxygen extraction fraction
  V0: 0.5           # Resting blood volume fraction
  kappa: 0.65       # Vasodilatory signal decay rate
  gamma: 0.41       # Autoregulatory feedback rate

# ── Acquisition (7T) ────────────────────────────
acquisition:
  TE: 0.25          # Echo time (s)
  r0: 340           # Intravascular relaxation rate
  f0: 28.625        # Frequency offset at outer vessel surface
  eps: 1.0e-32

# ── Simulation ──────────────────────────────────
simulation:
  num_layers: 3
  grid_size: [32, 32]
  dt: 0.1
  time_duration: 300
  max_pulses: 3
  pulse_type: rect
  neural_SNR: .inf
  BOLD_SNR: 20.0
  diffusion_coefficient_intra: 1.0
  diffusion_coefficient_inter: 0.0
  tau_d: 1.0

  # One entry per layer, bottom (deep) to top (superficial).
  # layer[i>0] drains from layer[i-1].
  layers:
    - tau: 2.66
      lambda_d: 0.0    # deep  – no drain source
    - tau: 2.66
      lambda_d: 0.5    # mid   – drains from deep
    - tau: 2.66
      lambda_d: 0.5    # sup   – drains from mid

# ── BOLD post-processing ────────────────────────
bold:
  psf_fwhm: [18.0, 27.675, 40.05]   # per-layer PSF FWHM (grid units)
  noise_model:
    field: "7T"
    V: 8.0
    TR: 2.0
  noise_scales: [1.0, 1.23, 1.16]
