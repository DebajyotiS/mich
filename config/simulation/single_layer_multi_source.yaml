# Scenario 2: single-layer cortex, multiple simultaneous active sources.
defaults:
  - base
  - _self_

output_path: data/simulations-single_layer_multi_source.h5

simulation:
  num_layers: 1
  min_active_layers: 1
  max_active_layers: 1
  source_placement:
    sources_per_layer: [2, 4]   # >=2 guarantees genuinely multiple sources
  layers:
    - {tau: "${simulation.layer_tau}", lambda_d: 0.0}  # deep — no drain source

bold:
  noise_scales: [1.0]   # single layer
