# Scenario 3: 3-layer cortex, exactly one active layer (chosen at random per
# simulation from the 3), with exactly one active source in it.
defaults:
  - base
  - _self_

output_path: data/simulations-three_layer_single_source_single_active.h5

simulation:
  min_active_layers: 1
  max_active_layers: 1
  source_placement:
    sources_per_layer: [1, 1]   # exactly one source
